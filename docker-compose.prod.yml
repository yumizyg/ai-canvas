services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_PATH: /ai-canvas
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && npm run seed && node server.js"
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://canvas:${POSTGRES_PASSWORD}@postgres:5432/canvas?schema=public
      REDIS_URL: redis://redis:6379
      HOSTNAME: 0.0.0.0
      PORT: 3000
      COOKIE_SECURE: "true"
      NEXT_PUBLIC_BASE_PATH: /ai-canvas
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - assets:/app/storage/assets
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_PATH: /ai-canvas
    restart: unless-stopped
    command: sh -c "npm run worker"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://canvas:${POSTGRES_PASSWORD}@postgres:5432/canvas?schema=public
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_BASE_PATH: /ai-canvas
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - assets:/app/storage/assets

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: canvas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: canvas
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canvas -d canvas"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres:
  assets:
